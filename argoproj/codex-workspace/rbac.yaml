apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: codex-workspace-read
rules:
  - apiGroups: [""]
    resources:
      - componentstatuses
      - configmaps
      - endpoints
      - events
      - limitranges
      - namespaces
      - nodes
      - persistentvolumeclaims
      - persistentvolumes
      - pods
      - replicationcontrollers
      - resourcequotas
      - serviceaccounts
      - services
    verbs: ["get", "list", "watch"]
  - apiGroups:
      - admissionregistration.k8s.io
      - apiextensions.k8s.io
      - apiregistration.k8s.io
      - apps
      - argocd-image-updater.argoproj.io
      - argoproj.io
      - autoscaling
      - batch
      - certificates.k8s.io
      - coordination.k8s.io
      - discovery.k8s.io
      - events.k8s.io
      - external-secrets.io
      - flowcontrol.apiserver.k8s.io
      - longhorn.io
      - monitoring.coreos.com
      - networking.k8s.io
      - node.k8s.io
      - pingcap.com
      - policy
      - projectcalico.org
      - rbac.authorization.k8s.io
      - scheduling.k8s.io
      - storage.k8s.io
    resources: ["*"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: codex-workspace-read
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: codex-workspace-read
subjects:
  - kind: ServiceAccount
    name: codex-workspace
    namespace: codex-workspace
