apiVersion: apps/v1
kind: Deployment
metadata:
  name: codex-workspace
  namespace: codex-workspace
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: codex-workspace
  template:
    metadata:
      labels:
        app: codex-workspace
    spec:
      serviceAccountName: codex-workspace
      automountServiceAccountToken: false
      nodeSelector:
        kubernetes.io/arch: amd64
      initContainers:
        - name: fetch-ssh-keys
          image: docker.io/curlimages/curl:8.21.0
          command:
            - /bin/sh
            - -ec
            - |
              mkdir -p /home/boxp/.ssh
              mkdir -p /home/boxp/.pi/agent
              rm -f /home/boxp/.pi/agent/models.json
              ln -s /etc/pi-agent-config/models.json /home/boxp/.pi/agent/models.json
              curl -fsSL https://github.com/boxp.keys -o /home/boxp/.ssh/authorized_keys
              test -s /home/boxp/.ssh/authorized_keys
              chown -R 1000:1000 /home/boxp/.ssh
              chown -h 1000:1000 /home/boxp/.pi/agent/models.json
              chmod 700 /home/boxp/.ssh
              chmod 600 /home/boxp/.ssh/authorized_keys
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            allowPrivilegeEscalation: false
            capabilities:
              add: ["CHOWN", "DAC_OVERRIDE", "FOWNER"]
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: home
              mountPath: /home/boxp
        - name: install-docker-cli
          image: docker.io/docker:29.6.1-cli
          command:
            - /bin/sh
            - -ec
            - |
              cp /usr/local/bin/docker /docker-cli/docker
              chmod 755 /docker-cli/docker
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: docker-cli
              mountPath: /docker-cli
      containers:
        - name: workspace
          image: ghcr.io/boxp/arch/codex-workspace:latest
          imagePullPolicy: Always
          ports:
            - name: ssh
              containerPort: 2222
            - name: even-terminal
              containerPort: 3456
          env:
            - name: EVEN_TERMINAL_PORT
              value: "3456"
            - name: EVEN_TERMINAL_CWD
              value: /home/boxp
            - name: EVEN_TERMINAL_PROVIDER
              value: codex
            - name: EVEN_TERMINAL_NAME
              value: lolice-codex-workspace
            - name: EVEN_TERMINAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: codex-workspace-even-terminal
                  key: token
            - name: GRAFANA_URL
              value: http://grafana.monitoring.svc.cluster.local:3000
            - name: GRAFANA_SERVICE_ACCOUNT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: codex-workspace-grafana
                  key: service-account-token
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: codex-workspace-gemini
                  key: GEMINI_API_KEY
            - name: PI_CODING_AGENT_DIR
              value: /home/boxp/.pi/agent
            - name: DOCKER_HOST
              value: tcp://127.0.0.1:2375
            - name: DOCKER_BUILDKIT
              value: "1"
            - name: KUBECONFIG
              value: /var/run/secrets/codex-workspace/kubeconfig/config
          securityContext:
            privileged: true
            runAsNonRoot: false
            runAsUser: 0
            allowPrivilegeEscalation: true
            capabilities:
              add:
                - AUDIT_WRITE
                - CHOWN
                - FOWNER
                - NET_ADMIN
                - NET_RAW
                - SETGID
                - SETUID
                - SYS_CHROOT
              drop: ["ALL"]
            readOnlyRootFilesystem: false
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "4"
              memory: "8Gi"
          readinessProbe:
            tcpSocket:
              port: ssh
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: ssh
            initialDelaySeconds: 30
            periodSeconds: 20
          volumeMounts:
            - name: home
              mountPath: /home/boxp
            - name: pi-config
              mountPath: /etc/pi-agent-config
              readOnly: true
            - name: sshd-config
              mountPath: /etc/ssh/sshd_config
              subPath: sshd_config
              readOnly: true
            - name: docker-cli
              mountPath: /usr/local/bin/docker
              subPath: docker
              readOnly: true
            - name: kubeconfig
              mountPath: /var/run/secrets/codex-workspace/kubeconfig
              readOnly: true
            - name: kubernetes-api-token
              mountPath: /var/run/secrets/codex-workspace/k8s
              readOnly: true
        - name: obsidian-sync
          image: ghcr.io/boxp/arch/codex-workspace:latest
          imagePullPolicy: Always
          command:
            - /bin/bash
            - -ec
            - |
              exec ob sync --path "${OBSIDIAN_VAULT_PATH}" --continuous
          env:
            - name: HOME
              value: /home/boxp
            - name: OBSIDIAN_VAULT_PATH
              value: /home/boxp/Documents/obsidian-headless/BOXP
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: home
              mountPath: /home/boxp
        - name: obsidian-task-board-draft
          image: ghcr.io/boxp/arch/codex-workspace:latest
          imagePullPolicy: Always
          command:
            - /bin/bash
            - -ec
            - |
              watch_script="${OBSIDIAN_VAULT_PATH}/Scripts/task-board-draft-watch.sh"
              while [ ! -f "${watch_script}" ]; do
                echo "Waiting for ${watch_script}"
                sleep 5
              done
              exec /bin/bash "${watch_script}"
          env:
            - name: HOME
              value: /home/boxp
            - name: OBSIDIAN_VAULT_PATH
              value: /home/boxp/Documents/obsidian-headless/BOXP
            - name: TASK_BOARD_DRAFT_WATCH_INTERVAL
              value: "1"
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false
          resources:
            requests:
              cpu: "25m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          volumeMounts:
            - name: home
              mountPath: /home/boxp
        - name: docker
          image: docker.io/docker:29.6.1-dind
          imagePullPolicy: IfNotPresent
          args:
            - dockerd
            - --host=tcp://127.0.0.1:2375
            - --host=unix:///var/run/docker.sock
            - --storage-driver=overlay2
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          securityContext:
            privileged: true
            runAsNonRoot: false
            runAsUser: 0
            allowPrivilegeEscalation: true
            readOnlyRootFilesystem: false
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "4Gi"
          volumeMounts:
            - name: docker-graph-storage
              mountPath: /var/lib/docker
        - name: codex-cron-scheduler
          image: ghcr.io/boxp/arch/codex-workspace:latest
          imagePullPolicy: Always
          command:
            - /opt/codex-workspace/cron/scheduler.bb
          env:
            - name: HOME
              value: /home/boxp
            - name: CODEX_HOME
              value: /home/boxp/.codex
            - name: CODEX_CRON_ROOT
              value: /home/boxp/Documents/obsidian-headless/BOXP/Infrastructure/Codex Cron
            - name: CODEX_CRON_POLL_SECONDS
              value: "30"
            - name: GRAFANA_URL
              value: http://grafana.monitoring.svc.cluster.local:3000
            - name: GRAFANA_SERVICE_ACCOUNT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: codex-workspace-grafana
                  key: service-account-token
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: codex-workspace-gemini
                  key: GEMINI_API_KEY
            - name: KUBECONFIG
              value: /var/run/secrets/codex-workspace/kubeconfig/config
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "2"
              memory: "4Gi"
          volumeMounts:
            - name: home
              mountPath: /home/boxp
            - name: kubeconfig
              mountPath: /var/run/secrets/codex-workspace/kubeconfig
              readOnly: true
            - name: kubernetes-api-token
              mountPath: /var/run/secrets/codex-workspace/k8s
              readOnly: true
        - name: task-board-runner
          image: ghcr.io/boxp/arch/codex-workspace:latest
          imagePullPolicy: Always
          command:
            - /opt/codex-workspace/task-board/task_board_runner.bb
            - loop
          env:
            - name: HOME
              value: /home/boxp
            - name: CODEX_HOME
              value: /home/boxp/.codex
            - name: CODEX_TASK_BOARD_ROOT
              value: /home/boxp/.codex-task-board
            - name: CODEX_TASK_BOARD_VAULT
              value: /home/boxp/Documents/obsidian-headless/BOXP
            - name: CODEX_TASK_BOARD_POLL_SECONDS
              value: "60"
            - name: CODEX_TASK_BOARD_LOCK_STALE_SECONDS
              value: "1800"
            - name: DOCKER_HOST
              value: tcp://127.0.0.1:2375
            - name: DOCKER_BUILDKIT
              value: "1"
            - name: KUBECONFIG
              value: /var/run/secrets/codex-workspace/kubeconfig/config
            - name: GRAFANA_URL
              value: http://grafana.monitoring.svc.cluster.local:3000
            - name: GRAFANA_SERVICE_ACCOUNT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: codex-workspace-grafana
                  key: service-account-token
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: codex-workspace-gemini
                  key: GEMINI_API_KEY
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "2"
              memory: "4Gi"
          volumeMounts:
            - name: home
              mountPath: /home/boxp
            - name: docker-cli
              mountPath: /usr/local/bin/docker
              subPath: docker
              readOnly: true
            - name: kubeconfig
              mountPath: /var/run/secrets/codex-workspace/kubeconfig
              readOnly: true
            - name: kubernetes-api-token
              mountPath: /var/run/secrets/codex-workspace/k8s
              readOnly: true
        - name: task-board-dashboard
          image: docker.io/python:3.13-alpine
          imagePullPolicy: IfNotPresent
          command:
            - python
            - /app/server.py
          ports:
            - name: dashboard
              containerPort: 8080
          env:
            - name: PYTHONDONTWRITEBYTECODE
              value: "1"
            - name: PORT
              value: "8080"
            - name: TASK_BOARD_ROOT
              value: /home/boxp/.codex-task-board
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          resources:
            requests:
              cpu: "25m"
              memory: "64Mi"
            limits:
              cpu: "250m"
              memory: "256Mi"
          readinessProbe:
            httpGet:
              path: /healthz
              port: dashboard
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: dashboard
            initialDelaySeconds: 10
            periodSeconds: 20
          volumeMounts:
            - name: home
              mountPath: /home/boxp
              readOnly: true
            - name: dashboard-app
              mountPath: /app
              readOnly: true
      volumes:
        - name: home
          persistentVolumeClaim:
            claimName: codex-workspace-home
        - name: sshd-config
          configMap:
            name: codex-workspace-sshd-config
        - name: pi-config
          configMap:
            name: codex-workspace-pi-config
        - name: docker-cli
          emptyDir: {}
        - name: docker-graph-storage
          emptyDir: {}
        - name: kubeconfig
          configMap:
            name: codex-workspace-kubeconfig
        - name: kubernetes-api-token
          projected:
            sources:
              - serviceAccountToken:
                  path: token
                  expirationSeconds: 3600
                  audience: https://kubernetes.default.svc.cluster.local
              - configMap:
                  name: kube-root-ca.crt
                  items:
                    - key: ca.crt
                      path: ca.crt
              - downwardAPI:
                  items:
                    - path: namespace
                      fieldRef:
                        fieldPath: metadata.namespace
        - name: dashboard-app
          configMap:
            name: codex-task-board-dashboard
