apiVersion: apps/v1
kind: Deployment
metadata:
  name: codex-workspace
  namespace: codex-workspace
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: codex-workspace
  template:
    metadata:
      labels:
        app: codex-workspace
    spec:
      serviceAccountName: codex-workspace
      automountServiceAccountToken: false
      nodeSelector:
        kubernetes.io/arch: amd64
      initContainers:
        - name: fetch-ssh-keys
          image: docker.io/curlimages/curl:8.20.0
          command:
            - /bin/sh
            - -ec
            - |
              mkdir -p /home/boxp/.ssh
              curl -fsSL https://github.com/boxp.keys -o /home/boxp/.ssh/authorized_keys
              test -s /home/boxp/.ssh/authorized_keys
              chown -R 1000:1000 /home/boxp/.ssh
              chmod 700 /home/boxp/.ssh
              chmod 600 /home/boxp/.ssh/authorized_keys
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            allowPrivilegeEscalation: false
            capabilities:
              add: ["CHOWN", "DAC_OVERRIDE", "FOWNER"]
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: home
              mountPath: /home/boxp
        - name: install-docker-cli
          image: docker.io/docker:29.5.2-cli
          command:
            - /bin/sh
            - -ec
            - |
              cp /usr/local/bin/docker /docker-cli/docker
              chmod 755 /docker-cli/docker
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: docker-cli
              mountPath: /docker-cli
        - name: install-kubectl
          image: docker.io/curlimages/curl:8.20.0
          command:
            - /bin/sh
            - -ec
            - |
              curl -fsSL https://dl.k8s.io/release/v1.36.1/bin/linux/amd64/kubectl -o /codex-tools/kubectl
              echo '629d3f410e09bf49b64ae7079f7f0bda1191efed311f7d37fdbab0ad5b0ec2b7  /codex-tools/kubectl' | sha256sum -c -
              chmod 755 /codex-tools/kubectl
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          volumeMounts:
            - name: codex-tools
              mountPath: /codex-tools
        - name: install-kustomize
          image: docker.io/curlimages/curl:8.20.0
          command:
            - /bin/sh
            - -ec
            - |
              curl -fsSL https://github.com/kubernetes-sigs/kustomize/releases/download/kustomize/v5.8.1/kustomize_v5.8.1_linux_amd64.tar.gz -o /tmp/kustomize.tar.gz
              echo '029a7f0f4e1932c52a0476cf02a0fd855c0bb85694b82c338fc648dcb53a819d  /tmp/kustomize.tar.gz' | sha256sum -c -
              tar -xzf /tmp/kustomize.tar.gz -C /codex-tools kustomize
              chmod 755 /codex-tools/kustomize
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false
          volumeMounts:
            - name: codex-tools
              mountPath: /codex-tools
      containers:
        - name: workspace
          image: ghcr.io/boxp/arch/codex-workspace:latest
          imagePullPolicy: Always
          ports:
            - name: ssh
              containerPort: 2222
            - name: even-terminal
              containerPort: 3456
          env:
            - name: EVEN_TERMINAL_PORT
              value: "3456"
            - name: EVEN_TERMINAL_CWD
              value: /home/boxp
            - name: EVEN_TERMINAL_PROVIDER
              value: codex
            - name: EVEN_TERMINAL_NAME
              value: lolice-codex-workspace
            - name: EVEN_TERMINAL_TOKEN
              valueFrom:
                secretKeyRef:
                  name: codex-workspace-even-terminal
                  key: token
            - name: GRAFANA_URL
              value: http://grafana.monitoring.svc.cluster.local:3000
            - name: GRAFANA_SERVICE_ACCOUNT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: codex-workspace-grafana
                  key: service-account-token
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: codex-workspace-gemini
                  key: GEMINI_API_KEY
            - name: DOCKER_HOST
              value: tcp://127.0.0.1:2375
            - name: DOCKER_BUILDKIT
              value: "1"
            - name: PATH
              value: /usr/local/codex-tools:/home/boxp/.local/bin:/home/boxp/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
          securityContext:
            runAsNonRoot: false
            runAsUser: 0
            allowPrivilegeEscalation: true
            capabilities:
              add: ["AUDIT_WRITE", "CHOWN", "FOWNER", "SETGID", "SETUID", "SYS_CHROOT"]
              drop: ["ALL"]
            readOnlyRootFilesystem: false
          resources:
            requests:
              cpu: "500m"
              memory: "1Gi"
            limits:
              cpu: "4"
              memory: "8Gi"
          readinessProbe:
            tcpSocket:
              port: ssh
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: ssh
            initialDelaySeconds: 30
            periodSeconds: 20
          volumeMounts:
            - name: home
              mountPath: /home/boxp
            - name: sshd-config
              mountPath: /etc/ssh/sshd_config
              subPath: sshd_config
              readOnly: true
            - name: docker-cli
              mountPath: /usr/local/bin/docker
              subPath: docker
              readOnly: true
            - name: codex-tools
              mountPath: /usr/local/codex-tools
              readOnly: true
            - name: kube-api-access
              mountPath: /var/run/secrets/kubernetes.io/serviceaccount
              readOnly: true
        - name: obsidian-sync
          image: ghcr.io/boxp/arch/codex-workspace:latest
          imagePullPolicy: Always
          command:
            - /bin/bash
            - -ec
            - |
              exec ob sync --path "${OBSIDIAN_VAULT_PATH}" --continuous
          env:
            - name: HOME
              value: /home/boxp
            - name: OBSIDIAN_VAULT_PATH
              value: /home/boxp/Documents/obsidian-headless/BOXP
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"
          volumeMounts:
            - name: home
              mountPath: /home/boxp
        - name: docker
          image: docker.io/docker:29.5.2-dind
          imagePullPolicy: IfNotPresent
          args:
            - dockerd
            - --host=tcp://127.0.0.1:2375
            - --host=unix:///var/run/docker.sock
            - --storage-driver=overlay2
          env:
            - name: DOCKER_TLS_CERTDIR
              value: ""
          securityContext:
            privileged: true
            runAsNonRoot: false
            runAsUser: 0
            allowPrivilegeEscalation: true
            readOnlyRootFilesystem: false
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "2"
              memory: "4Gi"
          volumeMounts:
            - name: docker-graph-storage
              mountPath: /var/lib/docker
        - name: codex-cron-scheduler
          image: ghcr.io/boxp/arch/codex-workspace:latest
          imagePullPolicy: Always
          command:
            - /opt/codex-workspace/cron/scheduler.bb
          env:
            - name: HOME
              value: /home/boxp
            - name: CODEX_HOME
              value: /home/boxp/.codex
            - name: CODEX_CRON_ROOT
              value: /home/boxp/.codex-cron
            - name: CODEX_CRON_POLL_SECONDS
              value: "30"
            - name: GRAFANA_URL
              value: http://grafana.monitoring.svc.cluster.local:3000
            - name: GRAFANA_SERVICE_ACCOUNT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: codex-workspace-grafana
                  key: service-account-token
            - name: GEMINI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: codex-workspace-gemini
                  key: GEMINI_API_KEY
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false
          resources:
            requests:
              cpu: "50m"
              memory: "128Mi"
            limits:
              cpu: "2"
              memory: "4Gi"
          volumeMounts:
            - name: home
              mountPath: /home/boxp
      volumes:
        - name: home
          persistentVolumeClaim:
            claimName: codex-workspace-home
        - name: sshd-config
          configMap:
            name: codex-workspace-sshd-config
        - name: docker-cli
          emptyDir: {}
        - name: codex-tools
          emptyDir: {}
        - name: docker-graph-storage
          emptyDir: {}
        - name: kube-api-access
          projected:
            sources:
              - serviceAccountToken:
                  path: token
                  expirationSeconds: 3600
              - configMap:
                  name: kube-root-ca.crt
                  items:
                    - key: ca.crt
                      path: ca.crt
              - downwardAPI:
                  items:
                    - path: namespace
                      fieldRef:
                        fieldPath: metadata.namespace
