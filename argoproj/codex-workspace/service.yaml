apiVersion: v1
kind: Service
metadata:
  name: codex-workspace
  namespace: codex-workspace
spec:
  type: LoadBalancer
  loadBalancerIP: 192.168.10.98
  selector:
    app: codex-workspace
  ports:
    - name: ssh
      port: 22
      targetPort: ssh
    - name: even-terminal
      port: 3456
      targetPort: even-terminal
    - name: mosh
      port: 60001
      targetPort: mosh
      protocol: UDP
