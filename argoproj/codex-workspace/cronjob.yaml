apiVersion: batch/v1
kind: CronJob
metadata:
  name: codex-cron-workspace-maintenance
  namespace: codex-workspace
  labels:
    app: codex-workspace-cron
    codex-workspace.boxp.io/cron: workspace-maintenance
spec:
  # Keep this in sync with jobs.yaml entry schedule/timeZone/enabled.
  suspend: true
  schedule: "0 22 * * *"
  timeZone: Etc/UTC
  concurrencyPolicy: Forbid
  startingDeadlineSeconds: 900
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 0
      template:
        metadata:
          labels:
            app: codex-workspace-cron
            codex-workspace.boxp.io/cron: workspace-maintenance
        spec:
          restartPolicy: Never
          automountServiceAccountToken: false
          nodeSelector:
            kubernetes.io/arch: amd64
          affinity:
            podAffinity:
              requiredDuringSchedulingIgnoredDuringExecution:
                - labelSelector:
                    matchLabels:
                      app: codex-workspace
                  topologyKey: kubernetes.io/hostname
          containers:
            - name: codex
              image: ghcr.io/boxp/arch/codex-workspace:latest
              imagePullPolicy: Always
              command:
                - /opt/codex-cron/run-codex-cron.sh
              env:
                - name: HOME
                  value: /home/boxp
                - name: CODEX_HOME
                  value: /home/boxp/.codex
                - name: CODEX_CRON_JOB_ID
                  value: workspace-maintenance
                - name: CODEX_CRON_JOBS_FILE
                  value: /opt/codex-cron/jobs.yaml
                - name: GRAFANA_URL
                  value: http://grafana.monitoring.svc.cluster.local:3000
                - name: GRAFANA_SERVICE_ACCOUNT_TOKEN
                  valueFrom:
                    secretKeyRef:
                      name: codex-workspace-grafana
                      key: service-account-token
              securityContext:
                runAsNonRoot: true
                runAsUser: 1000
                runAsGroup: 1000
                allowPrivilegeEscalation: false
                capabilities:
                  drop: ["ALL"]
                readOnlyRootFilesystem: false
              resources:
                requests:
                  cpu: "250m"
                  memory: "512Mi"
                limits:
                  cpu: "4"
                  memory: "8Gi"
              volumeMounts:
                - name: home
                  mountPath: /home/boxp
                - name: cron-config
                  mountPath: /opt/codex-cron
                  readOnly: true
          volumes:
            - name: home
              persistentVolumeClaim:
                claimName: codex-workspace-home
            - name: cron-config
              configMap:
                name: codex-workspace-cron
                defaultMode: 0555
---
