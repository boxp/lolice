apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: palserver-2
  namespace: argocd
spec:
  project: default
  source:
    repoURL: git@github.com:boxp/lolice.git
    targetRevision: main
    path: argoproj/palserver-2
  destination:
    server: 'https://kubernetes.default.svc'
    namespace: palserver-2
  syncPolicy:
    automated:
      selfHeal: true
    syncOptions:
    - CreateNamespace=true
