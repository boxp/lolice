apiVersion: argocd-image-updater.argoproj.io/v1alpha1
kind: ImageUpdater
metadata:
  name: hermes-agent
  namespace: argocd
spec:
  applicationRefs:
    - namePattern: "hermes-agent"
      images:
        - alias: "hermes-agent"
          imageName: "docker.io/nousresearch/hermes-agent:latest"
          commonUpdateSettings:
            updateStrategy: "digest"
            platforms:
              - "linux/amd64"
          manifestTargets:
            kustomize:
              name: "docker.io/nousresearch/hermes-agent"
        - alias: "obsidian-sync"
          imageName: "ghcr.io/boxp/arch/codex-workspace:latest"
          commonUpdateSettings:
            updateStrategy: "newest-build"
            platforms:
              - "linux/amd64"
          manifestTargets:
            kustomize:
              name: "ghcr.io/boxp/arch/codex-workspace"
  writeBackConfig:
    method: "git:secret:argocd/repo-lolice"
    gitConfig:
      repository: "git@github.com:boxp/lolice.git"
      branch: "main"
