apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: kubernetes-dashboard-app
  namespace: argocd
spec:
  project: default
  sources:
    - repoURL: https://kubernetes-retired.github.io/dashboard
      targetRevision: 7.1.2
      chart: kubernetes-dashboard
    - repoURL: https://github.com/boxp/lolice.git
      targetRevision: main
      path: argoproj/kubernetes-dashboard/manifests
  destination:
    server: 'https://kubernetes.default.svc' 
    namespace: kube-dashboard
  syncPolicy:
    syncOptions:
    - CreateNamespace=true
    - RespectIgnoreDifferences=true
  ignoreDifferences:
    - kind: Secret
      name: kubernetes-dashboard-app-csrf
      namespace: kube-dashboard
      jsonPointers:
        - /data/private.key
    - group: apps
      kind: Deployment
      name: kubernetes-dashboard-app-api
      namespace: kube-dashboard
      jqPathExpressions:
        - .spec.template.metadata.annotations.rollme
    - group: apps
      kind: Deployment
      name: kubernetes-dashboard-app-auth
      namespace: kube-dashboard
      jqPathExpressions:
        - .spec.template.metadata.annotations.rollme
