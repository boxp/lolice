apiVersion: v1
kind: ConfigMap
metadata:
  name: claude-settings
  namespace: openclaw
data:
  settings.json: |
    {
      "permissions": {
        "defaultMode": "acceptEdits",
        "allow": [
          "Read",
          "Glob",
          "Grep",
          "Bash(git *)",
          "Bash(gh *)",
          "Bash(ghq *)",
          "Bash(gwq *)",
          "Bash(mkdir *)",
          "Bash(touch *)",
          "Bash(cp *)",
          "Bash(mv *)",
          "Bash(rm *)",
          "Bash(ls *)",
          "Bash(cat *)",
          "Bash(head *)",
          "Bash(tail *)",
          "Bash(find *)",
          "Bash(grep *)",
          "Bash(sed *)",
          "Bash(awk *)",
          "Bash(sort *)",
          "Bash(uniq *)",
          "Bash(wc *)",
          "Bash(diff *)",
          "Bash(chmod *)",
          "Bash(ln *)",
          "Bash(curl *)",
          "Bash(tar *)",
          "Bash(xargs *)",
          "Bash(dirname *)",
          "Bash(basename *)",
          "Bash(tee *)",
          "Bash(codex *)",
          "Bash(docker *)",
          "Bash(bb *)",
          "Bash(man *)",
          "Bash(apt-get *)",
          "Bash(apt *)",
          "Bash(bash /home/node/.claude/skills/xai-x-search/scripts/search.sh *)",
          "Bash(bash /home/node/.claude/skills/xai-web-search/scripts/search.sh *)",
          "WebFetch",
          "mcp__grafana__*"
        ]
      },
      "mcpServers": {
        "grafana": {
          "command": "mcp-grafana",
          "args": ["--transport", "stdio", "--disable-write"]
        }
      }
    }
