apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: hermes-agent-cloudflared
  namespace: argocd
spec:
  destination:
    namespace: hermes-agent-cloudflared
    server: https://kubernetes.default.svc
  project: default
  source:
    path: argoproj/hermes-agent-cloudflared
    repoURL: https://github.com/boxp/lolice
    targetRevision: main
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
