apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: codex-workspace-debug
  namespace: hermes-agent
rules:
  - apiGroups: [""]
    resources:
      - pods/log
    verbs: ["get"]
  - apiGroups: [""]
    resources:
      - pods/exec
    verbs: ["create"]
  - apiGroups: [""]
    resources:
      - pods/attach
    verbs: ["create"]
  - apiGroups: [""]
    resources:
      - pods/ephemeralcontainers
    verbs: ["patch", "update"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: codex-workspace-debug
  namespace: hermes-agent
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: codex-workspace-debug
subjects:
  - kind: ServiceAccount
    name: codex-workspace
    namespace: codex-workspace
