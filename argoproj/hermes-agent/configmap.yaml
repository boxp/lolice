apiVersion: v1
kind: ConfigMap
metadata:
  name: hermes-agent-config
data:
  gai.conf: |
    # Prefer IPv4-mapped addresses because the lolice cluster currently has no
    # working IPv6 egress route. Google OAuth endpoints publish AAAA records,
    # and Python OAuth clients can otherwise try IPv6 first and fail with
    # ENETUNREACH before falling back reliably.
    precedence ::ffff:0:0/96  100

  config.yaml: |
    model:
      provider: custom
      default: ornith-35b
      model: ornith-35b
      base_url: http://llama-server.local-llm.svc.cluster.local:8080/v1
      api_key: local-llm
      supports_vision: false
      context_length: 65536

    display:
      tool_progress: "new"

    tool_loop_guardrails:
      hard_stop_enabled: true
      hard_stop_after:
        exact_failure: 5
        idempotent_no_progress: 5
