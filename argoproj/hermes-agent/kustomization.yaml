apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: hermes-agent

resources:
  - namespace.yaml
  - configmap.yaml
  - pvc.yaml
  - external-secret-cloudflared.yaml
  - deployment.yaml
  - networkpolicy.yaml

configMapGenerator:
  - name: hermes-agent-obsidian-task-board-skill
    files:
      - SKILL.md=skills/obsidian-task-board/SKILL.md
      - task-board.bb=skills/obsidian-task-board/bin/task-board.bb
