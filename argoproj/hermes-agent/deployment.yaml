apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-agent
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: hermes-agent
  template:
    metadata:
      labels:
        app: hermes-agent
    spec:
      automountServiceAccountToken: false
      nodeSelector:
        kubernetes.io/arch: amd64
      securityContext:
        fsGroup: 10000
      initContainers:
        - name: bootstrap-config
          image: docker.io/library/busybox:1.38.0
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              set -eu
              mkdir -p /opt/data/Documents/obsidian-headless/BOXP
              if [ ! -f /opt/data/.shared-uid-gid-migrated ]; then
                chown -R 1000:10000 /opt/data
                find /opt/data -type d -exec chmod g+rws {} \;
                touch /opt/data/.shared-uid-gid-migrated
                chown 1000:10000 /opt/data/.shared-uid-gid-migrated
              fi
              if [ ! -f /opt/data/config.yaml ]; then
                cp /bootstrap/config.yaml /opt/data/config.yaml
                chown 1000:10000 /opt/data/config.yaml
                chmod 0664 /opt/data/config.yaml
              fi
              if [ ! -f /opt/data/SOUL.md ]; then
                cp /bootstrap/SOUL.md /opt/data/SOUL.md
                chown 1000:10000 /opt/data/SOUL.md
                chmod 0664 /opt/data/SOUL.md
              fi
              chown 1000:10000 \
                /opt/data \
                /opt/data/Documents \
                /opt/data/Documents/obsidian-headless \
                /opt/data/Documents/obsidian-headless/BOXP
              chmod 2775 \
                /opt/data \
                /opt/data/Documents \
                /opt/data/Documents/obsidian-headless \
                /opt/data/Documents/obsidian-headless/BOXP
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              add: ["CHOWN", "DAC_OVERRIDE", "FOWNER"]
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: config
              mountPath: /bootstrap
              readOnly: true
        - name: install-obsidian-headless
          image: docker.io/library/node:24-bookworm-slim
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              npm_config_prefix=/opt/obsidian-headless npm install -g "obsidian-headless@${OBSIDIAN_HEADLESS_VERSION}"
              chown -R 1000:10000 /opt/obsidian-headless
          env:
            - name: OBSIDIAN_HEADLESS_VERSION
              value: "0.0.12"
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
              add: ["CHOWN", "DAC_OVERRIDE", "FOWNER"]
          volumeMounts:
            - name: obsidian-headless
              mountPath: /opt/obsidian-headless
        - name: install-babashka
          image: docker.io/library/busybox:1.38.0
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              wget -O /tmp/babashka.tar.gz "https://github.com/babashka/babashka/releases/download/v${BABASHKA_VERSION}/babashka-${BABASHKA_VERSION}-linux-amd64-static.tar.gz"
              echo "${BABASHKA_SHA256}  /tmp/babashka.tar.gz" | sha256sum -c -
              tar -xzf /tmp/babashka.tar.gz -C /opt/hermes-tools bb
              chmod 0755 /opt/hermes-tools/bb
          env:
            - name: BABASHKA_VERSION
              value: "1.12.218"
            - name: BABASHKA_SHA256
              value: 7bd028cc794732ffde3da31ce4379840893c8e54f1046f92a8dfc4f4b3cddaf8
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: hermes-tools
              mountPath: /opt/hermes-tools
      containers:
        - name: hermes-agent
          image: docker.io/nousresearch/hermes-agent:latest
          imagePullPolicy: Always
          args:
            - gateway
            - run
          env:
            - name: HERMES_UID
              value: "1000"
            - name: HERMES_GID
              value: "10000"
            - name: API_SERVER_ENABLED
              value: "false"
            - name: HOME
              value: /opt/data
            - name: OBSIDIAN_VAULT_PATH
              value: /home/boxp/Documents/obsidian-headless/BOXP
            - name: LOCAL_LLM_BASE_URL
              value: http://llama-server.local-llm.svc.cluster.local:8080/v1
            - name: LOCAL_LLM_MODEL
              value: gemma4-26b-vision
            - name: HERMES_STREAM_READ_TIMEOUT
              value: "1800"
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: data
              mountPath: /home/boxp
            - name: tmp
              mountPath: /tmp
            - name: hermes-tools
              mountPath: /usr/local/bin/bb
              subPath: bb
              readOnly: true
        - name: obsidian-sync
          image: docker.io/library/node:24-bookworm-slim
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -ec
            - |
              umask 0002
              exec /opt/obsidian-headless/bin/ob sync --path "${OBSIDIAN_VAULT_PATH}" --continuous
          env:
            - name: HOME
              value: /home/boxp
            - name: PATH
              value: /opt/obsidian-headless/bin:/usr/local/sbin:/usr/local/bin:/usr/sbin:/usr/bin:/sbin:/bin
            - name: OBSIDIAN_VAULT_PATH
              value: /home/boxp/Documents/obsidian-headless/BOXP
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 10000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /home/boxp
            - name: obsidian-headless
              mountPath: /opt/obsidian-headless
              readOnly: true
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hermes-agent-data
        - name: obsidian-headless
          emptyDir: {}
        - name: hermes-tools
          emptyDir: {}
        - name: config
          configMap:
            name: hermes-agent-config
        - name: tmp
          emptyDir:
            sizeLimit: 2Gi
