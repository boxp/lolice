apiVersion: apps/v1
kind: Deployment
metadata:
  name: hermes-agent
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: hermes-agent
  template:
    metadata:
      labels:
        app: hermes-agent
    spec:
      automountServiceAccountToken: false
      securityContext:
        fsGroup: 10000
      initContainers:
        - name: bootstrap-config
          image: docker.io/library/busybox:1.37.0
          imagePullPolicy: IfNotPresent
          command:
            - sh
            - -c
            - |
              set -eu
              mkdir -p /opt/data/Documents/obsidian-headless/BOXP
              cp /bootstrap/config.yaml /opt/data/config.yaml
              if [ ! -f /opt/data/SOUL.md ]; then
                cp /bootstrap/SOUL.md /opt/data/SOUL.md
              fi
              chgrp -R 10000 /opt/data
              chmod -R g+rwX /opt/data
          securityContext:
            runAsUser: 0
            runAsGroup: 0
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: config
              mountPath: /bootstrap
              readOnly: true
      containers:
        - name: hermes-agent
          image: docker.io/nousresearch/hermes-agent:latest
          imagePullPolicy: Always
          args:
            - gateway
            - run
          env:
            - name: API_SERVER_ENABLED
              value: "false"
            - name: HOME
              value: /opt/data
            - name: OBSIDIAN_VAULT_PATH
              value: /home/boxp/Documents/obsidian-headless/BOXP
            - name: LOCAL_LLM_BASE_URL
              value: http://llama-server.local-llm.svc.cluster.local:8080/v1
            - name: LOCAL_LLM_MODEL
              value: gemma4-26b-vision
            - name: HERMES_STREAM_READ_TIMEOUT
              value: "1800"
          resources:
            requests:
              cpu: 500m
              memory: 1Gi
            limits:
              cpu: "2"
              memory: 4Gi
          volumeMounts:
            - name: data
              mountPath: /opt/data
            - name: data
              mountPath: /home/boxp
            - name: tmp
              mountPath: /tmp
        - name: obsidian-sync
          image: ghcr.io/boxp/arch/codex-workspace:latest
          imagePullPolicy: Always
          command:
            - /bin/bash
            - -ec
            - |
              exec ob sync --path "${OBSIDIAN_VAULT_PATH}" --continuous
          env:
            - name: HOME
              value: /home/boxp
            - name: OBSIDIAN_VAULT_PATH
              value: /home/boxp/Documents/obsidian-headless/BOXP
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 10000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: false
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: data
              mountPath: /home/boxp
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: hermes-agent-data
        - name: config
          configMap:
            name: hermes-agent-config
        - name: tmp
          emptyDir:
            sizeLimit: 2Gi
