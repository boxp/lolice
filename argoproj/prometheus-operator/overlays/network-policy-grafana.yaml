apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: grafana
  namespace: monitoring
spec:
  egress:
    - {}
  ingress:
    - from:
        - podSelector:
            matchLabels:
              app.kubernetes.io/name: prometheus
        - podSelector:
            matchLabels:
              app: cloudflared
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: codex-workspace
          podSelector:
            matchLabels:
              app: codex-workspace
        - ipBlock:
            cidr: 192.168.10.0/24
        # kube-vip Service LoadBalancer traffic is SNATed by kube-proxy on the
        # current control-plane service leader before it reaches the Grafana pod.
        - ipBlock:
            cidr: 192.178.46.166/32
        - ipBlock:
            cidr: 192.178.48.194/32
        - ipBlock:
            cidr: 192.178.80.45/32
      ports:
        - port: 3000
          protocol: TCP
  podSelector:
    matchLabels:
      app.kubernetes.io/component: grafana
      app.kubernetes.io/name: grafana
      app.kubernetes.io/part-of: kube-prometheus
  policyTypes:
    - Egress
    - Ingress
