apiVersion: apps/v1
kind: Deployment
metadata:
  name: llama-server
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: llama-server
  template:
    metadata:
      labels:
        app: llama-server
    spec:
      automountServiceAccountToken: false
      nodeSelector:
        lolice.io/gpu-worker: "true"
      tolerations:
        - key: lolice.io/gpu-worker
          operator: Equal
          value: "true"
          effect: NoSchedule
      securityContext:
        fsGroup: 1000
        supplementalGroups:
          - 44
          - 110
      containers:
        - name: llama-server
          image: ghcr.io/boxp/arch/llama-sycl:latest
          imagePullPolicy: Always
          args:
            - llama-server
            - -m
            - /models/Gemma4-26B-A4B-QAT-Uncensored-HauhauCS-Balanced-Q4_K_M.gguf
            - --host
            - 0.0.0.0
            - --port
            - "8080"
            - -dev
            - SYCL0
            - -ngl
            - "99"
            - -c
            - "4096"
            - --parallel
            - "1"
            - --cache-type-k
            - q8_0
            - --cache-type-v
            - turbo3
            - --no-warmup
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: ONEAPI_DEVICE_SELECTOR
              value: level_zero:0
            - name: ZES_ENABLE_SYSMAN
              value: "1"
            - name: HOME
              value: /tmp
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          resources:
            requests:
              cpu: "4"
              memory: 16Gi
              gpu.intel.com/i915: "1"
            limits:
              cpu: "12"
              memory: 80Gi
              gpu.intel.com/i915: "1"
          startupProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
          volumeMounts:
            - name: models
              mountPath: /models
              readOnly: true
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: models
          hostPath:
            path: /var/lib/local-llm/models
            type: Directory
        - name: tmp
          emptyDir: {}
