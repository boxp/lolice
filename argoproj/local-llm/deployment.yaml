apiVersion: apps/v1
kind: Deployment
metadata:
  name: llama-server
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: llama-server
  template:
    metadata:
      labels:
        app: llama-server
    spec:
      automountServiceAccountToken: false
      nodeSelector:
        lolice.io/gpu-worker: "true"
      tolerations:
        - key: lolice.io/gpu-worker
          operator: Equal
          value: "true"
          effect: NoSchedule
      securityContext:
        fsGroup: 1000
        supplementalGroups:
          - 44
          - 110
      containers:
        - name: llama-server
          image: ghcr.io/boxp/arch/llama-sycl:latest
          imagePullPolicy: Always
          args:
            - llama-server
            - --host
            - 0.0.0.0
            - --port
            - "8081"
            - -dev
            - SYCL0
            - --models-preset
            - /config/models.ini
            - --models-max
            - "1"
            - -ngl
            - "99"
            - -c
            - "65536"
            - --parallel
            - "1"
            - --cache-type-k
            - q8_0
            - --cache-type-v
            - f16
            - -fa
            - "on"
            - --jinja
            - --reasoning
            - "off"
            - --cpu-moe
            - --no-warmup
          ports:
            - name: llama-http
              containerPort: 8081
          env:
            - name: ONEAPI_DEVICE_SELECTOR
              value: level_zero:0
            - name: ZES_ENABLE_SYSMAN
              value: "1"
            - name: HOME
              value: /tmp
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          resources:
            requests:
              cpu: "4"
              memory: 16Gi
              gpu.intel.com/i915: "1"
            limits:
              cpu: "12"
              memory: 80Gi
              gpu.intel.com/i915: "1"
          startupProbe:
            httpGet:
              path: /health
              port: llama-http
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /health
              port: llama-http
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /health
              port: llama-http
            initialDelaySeconds: 60
            periodSeconds: 20
            timeoutSeconds: 5
          volumeMounts:
            - name: models
              mountPath: /models
              readOnly: true
            - name: tmp
              mountPath: /tmp
            - name: models-config
              mountPath: /config/models.ini
              subPath: models.ini
              readOnly: true
        - name: envoy
          image: docker.io/envoyproxy/envoy@sha256:4d496918618a7ebd6c71ae8285e31ebff092f3a0a5ad642d50decf4a54eb2456
          imagePullPolicy: IfNotPresent
          args:
            - -c
            - /etc/envoy/envoy.yaml
            - --log-level
            - warn
          ports:
            - name: http
              containerPort: 8080
            - name: metrics
              containerPort: 9901
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
            readOnlyRootFilesystem: true
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 500m
              memory: 256Mi
          readinessProbe:
            httpGet:
              path: /health
              port: http
            periodSeconds: 10
            timeoutSeconds: 5
          livenessProbe:
            httpGet:
              path: /server_info
              port: metrics
            initialDelaySeconds: 30
            periodSeconds: 20
            timeoutSeconds: 5
          volumeMounts:
            - name: envoy-config
              mountPath: /etc/envoy/envoy.yaml
              subPath: envoy.yaml
              readOnly: true
      volumes:
        - name: models
          hostPath:
            path: /var/lib/local-llm/models
            type: Directory
        - name: tmp
          emptyDir: {}
        - name: models-config
          configMap:
            name: llama-server-models
        - name: envoy-config
          configMap:
            name: llama-server-envoy
