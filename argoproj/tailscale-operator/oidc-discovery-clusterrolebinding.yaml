# Allow unauthenticated access to the OIDC discovery endpoint.
# Required by Tailscale Workload Identity Federation so that the
# tailnet coordination server can validate ServiceAccount tokens
# issued by the Kubernetes API server.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: oidc-discovery
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:service-account-issuer-discovery
subjects:
  - kind: Group
    apiGroup: rbac.authorization.k8s.io
    name: system:unauthenticated
