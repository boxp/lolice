# Tailscale Kubernetes Operator - Helm values
# Ref: https://tailscale.com/docs/features/kubernetes-operator

# ── Authentication: Workload Identity Federation (beta) ─────────────
# The operator authenticates to the tailnet using a projected
# ServiceAccount OIDC token.  No client secret is stored in the cluster.
#
# These values are generated by Terraform (boxp/arch) when creating the
# tailscale_federated_identity.k8s_operator resource.  After the first
# terraform apply, update with real values from:
#   terraform output k8s_operator_wif_client_id
#   terraform output k8s_operator_wif_audience
#
# To rollback to OAuth Secret mode, replace this block with:
#   oauth: {}
#   oauthSecretVolume:
#     secret:
#       secretName: tailscale-operator-oauth
oauth:
  clientId: "PLACEHOLDER_WIF_CLIENT_ID"
  audience: "PLACEHOLDER_WIF_AUDIENCE"

# Operator image tag (pinned for reproducibility)
image:
  tag: v1.94.2

# Operator runs in userspace mode (no NET_ADMIN required)
proxyConfig:
  defaultTags: "tag:k8s-operator"

# Resource limits for the operator itself
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

# Proxy resource limits (for sidecar/standalone proxy pods)
proxyResources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi
