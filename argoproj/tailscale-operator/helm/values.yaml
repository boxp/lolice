# Tailscale Kubernetes Operator - Helm values
# Ref: https://tailscale.com/docs/features/kubernetes-operator

# ── Authentication ──────────────────────────────────────────────────
# Current mode: OAuth Secret (via ExternalSecret).
# After Terraform (boxp/arch) applies the WIF credential, switch to
# Workload Identity Federation by replacing this block with:
#
#   oauth:
#     clientId: "<terraform output k8s_operator_wif_client_id>"
#     audience: "<terraform output k8s_operator_wif_audience>"
#
# and removing the oauthSecretVolume section below.
# See docs/runbook/tailscale-operator-workload-identity.md for details.
oauth: {}

# Mount the ExternalSecret-managed Secret (OAuth client credentials).
# Remove this section when switching to Workload Identity Federation.
oauthSecretVolume:
  secret:
    secretName: tailscale-operator-oauth

# Operator image tag (pinned for reproducibility)
image:
  tag: v1.94.2

# Operator runs in userspace mode (no NET_ADMIN required)
proxyConfig:
  defaultTags: "tag:k8s-operator"

# Resource limits for the operator itself
resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 256Mi

# Proxy resource limits (for sidecar/standalone proxy pods)
proxyResources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 100m
    memory: 128Mi
