apiVersion: nfd.k8s-sigs.io/v1alpha1
kind: NodeFeatureRule
metadata:
  name: intel-gpu-device
spec:
  rules:
    - name: intel.gpu
      labels:
        intel.feature.node.kubernetes.io/gpu: "true"
      matchFeatures:
        - feature: pci.device
          matchExpressions:
            vendor:
              op: In
              value:
                - "8086"
            class:
              op: In
              value:
                - "0300"
                - "0380"
      matchAny:
        - matchFeatures:
            - feature: kernel.loadedmodule
              matchExpressions:
                i915:
                  op: Exists
        - matchFeatures:
            - feature: kernel.enabledmodule
              matchExpressions:
                i915:
                  op: Exists
        - matchFeatures:
            - feature: kernel.loadedmodule
              matchExpressions:
                xe:
                  op: Exists
        - matchFeatures:
            - feature: kernel.enabledmodule
              matchExpressions:
                xe:
                  op: Exists
---
apiVersion: nfd.k8s-sigs.io/v1alpha1
kind: NodeFeatureRule
metadata:
  name: intel-gpu-platform-labeling
spec:
  rules:
    - name: intel.gpu.generic.deviceid
      labelsTemplate: |
        {{ range .pci.device }}gpu.intel.com/device-id.{{ .class }}-{{ .device }}.present=true
        {{ end }}
      matchFeatures:
        - feature: pci.device
          matchExpressions:
            vendor:
              op: In
              value:
                - "8086"
            class:
              op: In
              value:
                - "0300"
                - "0380"
    - name: intel.gpu.generic.count.0300
      labelsTemplate: gpu.intel.com/device-id.0300-{{ (index .pci.device 0).device }}.count={{ len .pci.device }}
      matchFeatures:
        - feature: pci.device
          matchExpressions:
            vendor:
              op: In
              value:
                - "8086"
            class:
              op: In
              value:
                - "0300"
    - name: intel.gpu.generic.count.0380
      labelsTemplate: gpu.intel.com/device-id.0380-{{ (index .pci.device 0).device }}.count={{ len .pci.device }}
      matchFeatures:
        - feature: pci.device
          matchExpressions:
            vendor:
              op: In
              value:
                - "8086"
            class:
              op: In
              value:
                - "0380"
